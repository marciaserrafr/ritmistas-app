<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritmistas - Carteirinha</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            flex-direction: column;
        }
        .topo {
            width: 100%;
            max-width: 380px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .topo span { color: #c9a84c; font-size: 14px; font-weight: bold; }
        .btn-sair {
            background: transparent;
            border: 1px solid #c9a84c;
            color: #c9a84c;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        /* CARTEIRINHA */
        .carteirinha-wrapper {
            width: 100%;
            max-width: 380px;
            perspective: 1000px;
        }
        .carteirinha-inner {
            position: relative;
            width: 100%;
            transition: transform 0.7s;
            transform-style: preserve-3d;
        }
        .carteirinha-wrapper.virada .carteirinha-inner {
            transform: rotateY(180deg);
        }

        /* FRENTE */
        .frente, .verso {
            width: 100%;
            border-radius: 16px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .verso {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotateY(180deg);
        }

        /* FRENTE - ESTILO */
        .frente {
            background: linear-gradient(160deg, #1a4a2e 0%, #0d3320 60%, #0a2518 100%);
            border: 2px solid #c9a84c;
            padding: 20px;
            color: white;
        }
        .frente-header {
            text-align: center;
            border-bottom: 1px solid #c9a84c;
            padding-bottom: 12px;
            margin-bottom: 16px;
        }
        .logo-placeholder {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #c9a84c;
            background: rgba(201,168,76,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-size: 24px;
        }
        .escola-nome {
            font-size: 13px;
            font-weight: bold;
            color: #c9a84c;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .bateria-nome {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            margin-top: 2px;
            letter-spacing: 1px;
        }
        .frente-body {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }
        .foto-box {
            flex-shrink: 0;
            width: 90px;
            height: 110px;
            border: 2px solid #c9a84c;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        .foto-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .dados-box { flex: 1; }
        .funcao-badge {
            background: #c9a84c;
            color: #0a2518;
            font-size: 10px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .ritmista-nome {
            font-size: 15px;
            font-weight: bold;
            color: white;
            margin-bottom: 2px;
            line-height: 1.2;
        }
        .ritmista-apelido {
            font-size: 12px;
            color: #c9a84c;
            font-style: italic;
            margin-bottom: 10px;
        }
        .dado-linha {
            margin-bottom: 6px;
        }
        .dado-label {
            font-size: 9px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .dado-valor {
            font-size: 12px;
            color: white;
            font-weight: bold;
        }
        .frente-footer {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid rgba(201,168,76,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .validade-box {
            border: 1px solid #c9a84c;
            padding: 4px 10px;
            border-radius: 6px;
        }
        .validade-label {
            font-size: 9px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
        }
        .validade-valor {
            font-size: 12px;
            color: #c9a84c;
            font-weight: bold;
        }
        .status-badge {
            background: #28a745;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
        }

        /* VERSO */
        .verso {
            background: linear-gradient(160deg, #0a2518 0%, #1a4a2e 100%);
            border: 2px solid #c9a84c;
            padding: 20px;
            color: white;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .verso-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #c9a84c;
            background: rgba(201,168,76,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 12px;
        }
        .verso-escola {
            font-size: 16px;
            font-weight: bold;
            color: #c9a84c;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .verso-bateria {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .verso-linha {
            width: 60%;
            height: 1px;
            background: #c9a84c;
            margin: 0 auto 16px;
        }
        .verso-presidente {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .verso-presidente-nome {
            font-size: 13px;
            color: white;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .assinatura {
            font-family: 'Brush Script MT', cursive;
            font-size: 28px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 4px;
        }
        .verso-mestre {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* BOTÕES */
        .btn-virar {
            margin-top: 12px;
            background: transparent;
            border: 1px solid #c9a84c;
            color: #c9a84c;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }
        .acoes {
            width: 100%;
            max-width: 380px;
            margin-top: 12px;
            display: flex;
            gap: 12px;
        }
        .btn-acao {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-salvar { background: #c9a84c; color: #0a2518; }
        .btn-compartilhar { background: #25D366; color: white; }
    </style>
</head>
<body>

    <div class="topo">
        <span>👑 Imperatriz Leopoldinense</span>
        <button class="btn-sair" onclick="sair()">Sair</button>
    </div>

    <div class="carteirinha-wrapper" id="carteirinhaWrapper">
        <div class="carteirinha-inner">

            <!-- FRENTE -->
            <div class="frente">
                <div class="frente-header">
                    <div class="logo-placeholder">👑</div>
                    <div class="escola-nome">Imperatriz Leopoldinense</div>
                    <div class="bateria-nome">Swing da Leopoldina</div>
                </div>
                <div class="frente-body">
                    <div class="foto-box" id="fotoRitmista">👤</div>
                    <div class="dados-box">
                        <div class="funcao-badge" id="funcaoRitmista">Ritmista</div>
                        <div class="ritmista-nome" id="nomeRitmista">-</div>
                        <div class="ritmista-apelido" id="apelidoRitmista"></div>
                        <div class="dado-linha">
                            <div class="dado-label">CPF</div>
                            <div class="dado-valor" id="cpfRitmista">-</div>
                        </div>
                        <div class="dado-linha">
                            <div class="dado-label">Instrumento</div>
                            <div class="dado-valor" id="instrumentoRitmista">-</div>
                        </div>
                    </div>
                </div>
                <div class="frente-footer">
                    <div class="validade-box">
                        <div class="validade-label">Válida até</div>
                        <div class="validade-valor">Carnaval 2027</div>
                    </div>
                    <div class="status-badge">✓ APROVADO</div>
                </div>
            </div>

            <!-- VERSO -->
            <div class="verso">
                <div class="verso-logo">👑</div>
                <div class="verso-escola">Imperatriz Leopoldinense</div>
                <div class="verso-bateria">Swing da Leopoldina — Temporada 2027</div>
                <div class="verso-linha"></div>
                <div class="verso-presidente">Presidente</div>
                <div class="verso-presidente-nome">A definir com a diretoria</div>
                <div class="assinatura">♪ ♫ ♪</div>
                <div class="verso-mestre">Mestre de Bateria</div>
            </div>

        </div>
    </div>

    <button class="btn-virar" onclick="virarCarteirinha()">🔄 Virar carteirinha</button>

    <div class="acoes">
        <button class="btn-acao btn-salvar" onclick="salvarImagem()">💾 Salvar imagem</button>
        <button class="btn-acao btn-compartilhar" onclick="compartilhar()">📲 Compartilhar</button>
    </div>

<script>
    const ritmista = JSON.parse(localStorage.getItem('ritmista'));

    if (!ritmista) {
        window.location.href = 'login.html';
    } else {
        document.getElementById('nomeRitmista').textContent = ritmista.nome;
        document.getElementById('apelidoRitmista').textContent = ritmista.apelido ? `"${ritmista.apelido}"` : '';
        document.getElementById('cpfRitmista').textContent = ritmista.cpf;
        document.getElementById('instrumentoRitmista').textContent = ritmista.instrumento || '-';

        if (ritmista.foto_url) {
            document.getElementById('fotoRitmista').innerHTML = `<img src="${ritmista.foto_url}">`;
        }
    }

    function virarCarteirinha() {
        document.getElementById('carteirinhaWrapper').classList.toggle('virada');
    }

    function sair() {
        localStorage.removeItem('ritmista');
        window.location.href = 'login.html';
    }

    function salvarImagem() {
        alert('Função de salvar imagem será ativada em breve!');
    }

    function compartilhar() {
        if (navigator.share) {
            navigator.share({
                title: 'Minha Carteirinha — Swing da Leopoldina',
                text: `${ritmista.nome} — Ritmista da Imperatriz Leopoldinense. Temporada 2027!`,
            });
        } else {
            alert('Compartilhamento não disponível neste dispositivo.');
        }
    }
</script>
</body>
</html>
