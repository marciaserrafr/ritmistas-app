<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteirinha - Swing da Leopoldina</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', serif;
            background: #111;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            flex-direction: column;
        }

        .topo {
            width: 300px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .topo-nome { color: #c9a227; font-size: 12px; letter-spacing: 1px; }
        .btn-sair {
            background: transparent;
            border: 1px solid #c9a227;
            color: #c9a227;
            padding: 5px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        /* ── FLIP ── */
        .carteirinha-wrapper { width: 300px; height: 510px; perspective: 1200px; }
        .carteirinha-inner {
            position: relative;
            width: 100%; height: 100%;
            transition: transform 0.9s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }
        .carteirinha-wrapper.virada .carteirinha-inner { transform: rotateY(180deg); }

        .frente, .verso {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 22px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            overflow: hidden;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8), 0 0 0 1.5px rgba(201,162,39,0.5);
        }
        .verso { transform: rotateY(180deg); }

        /* ══════════════════════════════
           FRENTE — inspirada na bandeira
           (branco + faixa diagonal verde)
        ══════════════════════════════ */
        .frente {
            background: #FAFAF2;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* SVG de fundo fica atrás de tudo */
        .bg-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        /* Conteúdo fica por cima do SVG */
        .frente-body {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Cabeçalho verde */
        .cabecalho {
            width: 100%;
            background: linear-gradient(180deg, #0a5c2b 0%, #0d7035 100%);
            padding: 14px 12px 12px;
            text-align: center;
            border-bottom: 2px solid #c9a227;
        }
        .cab-escola {
            font-size: 7.5px;
            color: rgba(255,255,255,0.65);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .cab-bateria {
            font-size: 17px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .cab-bateria em {
            color: #f0c842;
            font-style: normal;
        }

        /* Foto — maior */
        .foto-area { margin-top: 22px; }
        .foto-anel {
            width: 115px; height: 115px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, #8B6914, #f0c842, #c9a227, #8B6914);
            box-shadow: 0 8px 25px rgba(201,162,39,0.45);
        }
        .foto-interno {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: #ddd;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            font-size: 44px;
        }
        .foto-interno img { width: 100%; height: 100%; object-fit: cover; }

        /* Dados */
        .dados {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px 22px 20px;
            flex: 1;
        }
        .funcao-tag {
            background: #0d7035;
            color: #fff;
            font-size: 8px;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 3px 18px;
            border-radius: 20px;
            margin-bottom: 10px;
        }
        .nome {
            font-size: 20px;
            font-weight: bold;
            color: #111;
            text-align: center;
            line-height: 1.2;
        }
        .apelido {
            font-size: 13px;
            color: #0d7035;
            font-style: italic;
            margin-top: 2px;
            margin-bottom: 14px;
        }
        .divisor {
            width: 70%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c9a227, transparent);
            margin-bottom: 14px;
        }
        .grid-info {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }
        .info-box {
            background: rgba(255,255,255,0.7);
            border: 1px solid #ddd;
            border-radius: 9px;
            padding: 8px 10px;
            text-align: center;
            backdrop-filter: blur(4px);
        }
        .info-label {
            font-size: 7px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 3px;
        }
        .info-valor { font-size: 11px; font-weight: bold; color: #1a1a1a; }

        .validade-box {
            width: 100%;
            background: #0d7035;
            border-radius: 10px;
            padding: 9px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .val-label { font-size: 8px; color: rgba(255,255,255,0.65); text-transform: uppercase; letter-spacing: 1px; }
        .val-data { font-size: 16px; color: #f0c842; font-weight: bold; }

        /* ══════════════════════════════
           VERSO
        ══════════════════════════════ */
        .verso {
            background: #06200e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .verso-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }
        .verso-corpo {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0 28px;
            width: 100%;
        }
        .verso-logo {
            width: 110px; height: 110px;
            border-radius: 50%;
            border: 2px solid rgba(201,162,39,0.5);
            background: rgba(201,162,39,0.04);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 18px;
        }
        .verso-escola-nome {
            font-size: 13px;
            font-weight: bold;
            color: #c9a227;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .verso-fundacao {
            font-size: 9px;
            color: rgba(255,255,255,0.35);
            letter-spacing: 2px;
            margin-bottom: 22px;
        }
        .verso-div {
            width: 55%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c9a227, transparent);
            margin-bottom: 18px;
        }
        .verso-temporada {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .verso-ano {
            font-size: 36px;
            font-weight: bold;
            color: rgba(255,255,255,0.15);
            letter-spacing: 4px;
        }

        /* ── Botões ── */
        .btn-virar {
            margin-top: 18px;
            background: #0d7035;
            border: none;
            color: #fff;
            padding: 11px 34px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(13,112,53,0.5);
        }
        .acoes {
            width: 300px;
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }
        .btn-acao {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-salvar { background: transparent; border: 1px solid #c9a227; color: #c9a227; }
        .btn-compartilhar { background: #25D366; color: #fff; }
    </style>
</head>
<body>

<div class="topo">
    <span class="topo-nome">♛ Swing da Leopoldina</span>
    <button class="btn-sair" onclick="sair()">Sair</button>
</div>

<div class="carteirinha-wrapper" id="carteirinhaWrapper">
    <div class="carteirinha-inner">

        <!-- ═══════════ FRENTE ═══════════ -->
        <div class="frente">

            <!-- ★ Arte de fundo: bandeira da Imperatriz + coroa marca d'água ★ -->
            <svg class="bg-svg" viewBox="0 0 300 510" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
                <defs>
                    <linearGradient id="stripeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#0a5c2b"/>
                        <stop offset="50%" style="stop-color:#0d7035"/>
                        <stop offset="100%" style="stop-color:#0a5c2b"/>
                    </linearGradient>
                </defs>

                <!-- Fundo branco (como a bandeira da Imperatriz) -->
                <rect width="300" height="510" fill="#FAFAF2"/>

                <!-- Faixa diagonal verde — como a bandeira da Imperatriz -->
                <!-- Da margem esquerda y=155..230 até margem direita y=265..340 -->
                <path d="M0,155 L300,265 L300,345 L0,235 Z" fill="url(#stripeGrad)"/>

                <!-- Brilho sutil no topo da faixa -->
                <path d="M0,155 L300,265 L300,277 L0,167 Z" fill="rgba(255,255,255,0.06)"/>

                <!-- ★ COROA MARCA D'ÁGUA ★
                     Coroa imperial — base em y=320, picos chegam até y=190
                     Visível no centro do card, metade superior mais à vista -->
                <g transform="translate(150, 320)" opacity="0.13" fill="#b8870f" stroke="#b8870f" stroke-width="0.3">
                    <!-- BASE da coroa -->
                    <rect x="-78" y="0" width="156" height="24" rx="6"/>
                    <!-- Pérolas na base -->
                    <circle cx="-52" cy="12" r="5" fill="#c9a227" opacity="0.8"/>
                    <circle cx="-17" cy="12" r="5" fill="#c9a227" opacity="0.8"/>
                    <circle cx="17"  cy="12" r="5" fill="#c9a227" opacity="0.8"/>
                    <circle cx="52"  cy="12" r="5" fill="#c9a227" opacity="0.8"/>

                    <!-- CORPO da coroa — 5 arcos góticos (imperial) -->
                    <!-- Arco mais à esquerda (baixo) -->
                    <path d="M-78,0 L-78,-18 C-78,-40 -70,-52 -62,-60 C-54,-52 -50,-32 -50,-18 L-50,0 Z" stroke="none"/>
                    <!-- Arco esquerdo-centro (mais alto) -->
                    <path d="M-50,0 L-50,-22 C-50,-55 -38,-78 -26,-98 C-14,-78 -8,-55 -8,-22 L-8,0 Z" stroke="none"/>
                    <!-- Arco CENTRAL (o mais alto — cruz no topo) -->
                    <path d="M-8,0 L-8,-28 C-8,-65 -4,-92 0,-128 C4,-92 8,-65 8,-28 L8,0 Z" stroke="none"/>
                    <!-- Arco direito-centro (mais alto) -->
                    <path d="M8,0 L8,-22 C8,-55 14,-78 26,-98 C38,-78 50,-55 50,-22 L50,0 Z" stroke="none"/>
                    <!-- Arco mais à direita (baixo) -->
                    <path d="M50,0 L50,-18 C50,-32 54,-52 62,-60 C70,-52 78,-40 78,-18 L78,0 Z" stroke="none"/>

                    <!-- Orbes/gemas nos picos dos arcos -->
                    <circle cx="-62" cy="-62" r="7"  fill="#c9a227" opacity="0.9"/>
                    <circle cx="-26" cy="-100" r="8" fill="#c9a227" opacity="0.9"/>
                    <circle cx="0"   cy="-130" r="9" fill="#c9a227" opacity="0.9"/>
                    <circle cx="26"  cy="-100" r="8" fill="#c9a227" opacity="0.9"/>
                    <circle cx="62"  cy="-62"  r="7" fill="#c9a227" opacity="0.9"/>

                    <!-- Cruz no pico central (referência à coroa imperial) -->
                    <rect x="-2" y="-148" width="4" height="20" rx="1" fill="#c9a227"/>
                    <rect x="-7" y="-140" width="14" height="4" rx="1" fill="#c9a227"/>
                </g>

                <!-- Estrelas na área branca superior (como na bandeira — discreta) -->
                <g fill="#c9a227" opacity="0.12" font-size="10">
                    <text x="18"  y="130" text-anchor="middle">★</text>
                    <text x="282" y="130" text-anchor="middle">★</text>
                    <text x="18"  y="148" text-anchor="middle" font-size="7">★</text>
                    <text x="282" y="148" text-anchor="middle" font-size="7">★</text>
                </g>

                <!-- Borda dourada interna -->
                <rect x="5" y="5" width="290" height="500" rx="19" fill="none" stroke="#c9a227" stroke-width="0.8" opacity="0.35"/>
            </svg>

            <!-- Conteúdo da frente -->
            <div class="frente-body">
                <div class="cabecalho">
                    <div class="cab-escola">G.R.E.S. Imperatriz Leopoldinense</div>
                    <div class="cab-bateria">Swing da <em>Leopoldina</em></div>
                </div>

                <div class="foto-area">
                    <div class="foto-anel">
                        <div class="foto-interno" id="fotoRitmista">👤</div>
                    </div>
                </div>

                <div class="dados">
                    <div class="funcao-tag">✦ Ritmista ✦</div>
                    <div class="nome" id="nomeRitmista">—</div>
                    <div class="apelido" id="apelidoRitmista"></div>
                    <div class="divisor"></div>
                    <div class="grid-info">
                        <div class="info-box">
                            <div class="info-label">CPF</div>
                            <div class="info-valor" id="cpfRitmista">—</div>
                        </div>
                        <div class="info-box">
                            <div class="info-label">Instrumento</div>
                            <div class="info-valor" id="instrumentoRitmista">—</div>
                        </div>
                    </div>
                    <div class="validade-box">
                        <span class="val-label">Válida até</span>
                        <span class="val-data" id="validadeCarteirinha">31/07/2027</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ═══════════ VERSO ═══════════ -->
        <div class="verso">

            <!-- Fundo artístico do verso -->
            <svg class="verso-bg" viewBox="0 0 300 510" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="vbg" cx="50%" cy="42%" r="60%">
                        <stop offset="0%" style="stop-color:#0f3d1c"/>
                        <stop offset="100%" style="stop-color:#040f07"/>
                    </radialGradient>
                </defs>
                <rect width="300" height="510" fill="url(#vbg)"/>

                <!-- Faixa diagonal branca sutil (verso da bandeira) -->
                <path d="M0,155 L300,265 L300,345 L0,235 Z" fill="rgba(255,255,255,0.025)"/>

                <!-- Círculos ornamentais CENTRADOS (150, 255) -->
                <circle cx="150" cy="255" r="175" fill="none" stroke="#c9a227" stroke-width="0.5" opacity="0.1"/>
                <circle cx="150" cy="255" r="135" fill="none" stroke="#c9a227" stroke-width="0.5" opacity="0.08"/>
                <circle cx="150" cy="255" r="95"  fill="none" stroke="#c9a227" stroke-width="0.5" opacity="0.06"/>

                <!-- ★ COROA DO VERSO — CENTRALIZADA em (150, 255) ★ -->
                <!-- Base em y=275, picos chegam a y=145 — bem centrada -->
                <g transform="translate(150, 275)" opacity="0.18" fill="#c9a227" stroke="none">
                    <rect x="-60" y="0" width="120" height="18" rx="4"/>
                    <circle cx="-40" cy="9" r="4"/>
                    <circle cx="-13" cy="9" r="4"/>
                    <circle cx="13"  cy="9" r="4"/>
                    <circle cx="40"  cy="9" r="4"/>

                    <path d="M-60,0 L-60,-14 C-60,-30 -54,-40 -47,-47 C-40,-40 -38,-24 -38,-14 L-38,0 Z"/>
                    <path d="M-38,0 L-38,-17 C-38,-42 -28,-60 -20,-74 C-12,-60 -6,-42 -6,-17 L-6,0 Z"/>
                    <path d="M-6,0 L-6,-22 C-6,-50 -3,-72 0,-96 C3,-72 6,-50 6,-22 L6,0 Z"/>
                    <path d="M6,0 L6,-17 C6,-42 12,-60 20,-74 C28,-60 38,-42 38,-17 L38,0 Z"/>
                    <path d="M38,0 L38,-14 C38,-24 40,-40 47,-47 C54,-40 60,-30 60,-14 L60,0 Z"/>

                    <circle cx="-47" cy="-49" r="5"/>
                    <circle cx="-20" cy="-76" r="6"/>
                    <circle cx="0"   cy="-98" r="7"/>
                    <circle cx="20"  cy="-76" r="6"/>
                    <circle cx="47"  cy="-49" r="5"/>

                    <rect x="-2" y="-110" width="4" height="14" rx="1"/>
                    <rect x="-5" y="-104" width="10" height="3" rx="1"/>
                </g>

                <!-- Ornamentos dos 4 cantos -->
                <g stroke="#c9a227" stroke-width="0.8" fill="rgba(201,162,39,0.08)" opacity="0.3">
                    <polygon points="12,12 28,20 20,36 12,36"/>
                    <polygon points="288,12 272,20 280,36 288,36"/>
                    <polygon points="12,498 28,490 20,474 12,474"/>
                    <polygon points="288,498 272,490 280,474 288,474"/>
                </g>

                <!-- Borda interna dourada -->
                <rect x="5" y="5" width="290" height="500" rx="19" fill="none" stroke="#c9a227" stroke-width="0.8" opacity="0.25"/>
            </svg>

            <!-- Conteúdo do verso -->
            <div class="verso-corpo">
                <!-- Coroa SVG artística (logo da Imperatriz) -->
                <div class="verso-logo">
                    <svg viewBox="0 0 110 110" width="88" height="88">
                        <g transform="translate(55, 68)" fill="none" stroke="#c9a227" stroke-width="1.5" stroke-linejoin="round">
                            <rect x="-38" y="0" width="76" height="14" rx="3" fill="rgba(201,162,39,0.12)"/>
                            <circle cx="-25" cy="7" r="3.5" fill="#c9a227" opacity="0.7"/>
                            <circle cx="-8"  cy="7" r="3.5" fill="#c9a227" opacity="0.7"/>
                            <circle cx="8"   cy="7" r="3.5" fill="#c9a227" opacity="0.7"/>
                            <circle cx="25"  cy="7" r="3.5" fill="#c9a227" opacity="0.7"/>

                            <path d="M-38,0 L-38,-10 C-38,-22 -33,-29 -28,-34 C-23,-29 -21,-17 -21,-10 L-21,0" fill="rgba(201,162,39,0.1)"/>
                            <path d="M-21,0 L-21,-12 C-21,-30 -13,-42 -7,-54 C-1,-42 5,-30 5,-12 L5,0" fill="rgba(201,162,39,0.1)"/>
                            <path d="M5,0 L5,-14 C5,-35 8,-50 11,-65 C14,-50 17,-35 17,-14 L17,0" fill="rgba(201,162,39,0.1)"/>
                            <path d="M17,0 L17,-12 C17,-30 23,-42 29,-54 C35,-42 43,-30 43,-12 L43,0" fill="rgba(201,162,39,0.1)"/>
                            <path d="M43,0 L43,-10 C43,-17 45,-29 50,-34 C55,-29 60,-22 60,-10 L60,0" fill="rgba(201,162,39,0.1)"/>
                            <!-- Fechar corpo -->
                            <path d="M-38,0 L-38,-10 C-38,-22 -33,-29 -28,-34 C-23,-29 -21,-17 -21,-10 L-21,-12 C-21,-30 -13,-42 -7,-54 C-1,-42 5,-30 5,-12 L5,-14 C5,-35 8,-50 11,-65 C14,-50 17,-35 17,-14 L17,-12 C17,-30 23,-42 29,-54 C35,-42 43,-30 43,-12 L43,-10 C43,-17 45,-29 50,-34 C55,-29 60,-22 60,-10 L60,0" fill="rgba(201,162,39,0.08)"/>

                            <circle cx="-28" cy="-36" r="4" fill="#c9a227"/>
                            <circle cx="-7"  cy="-56" r="4.5" fill="#c9a227"/>
                            <circle cx="11"  cy="-67" r="5"   fill="#c9a227"/>
                            <circle cx="29"  cy="-56" r="4.5" fill="#c9a227"/>
                            <circle cx="50"  cy="-36" r="4"   fill="#c9a227"/>

                            <line x1="11" y1="-76" x2="11" y2="-60" stroke="#c9a227" stroke-width="1.2"/>
                            <line x1="6"  y1="-68" x2="16" y2="-68" stroke="#c9a227" stroke-width="1.2"/>
                        </g>
                    </svg>
                </div>

                <div class="verso-escola-nome">Imperatriz Leopoldinense</div>
                <div class="verso-fundacao">✦ Fundada em 1959 · Rio de Janeiro ✦</div>
                <div class="verso-div"></div>
                <div class="verso-temporada">Temporada</div>
                <div class="verso-ano">2027</div>
            </div>
        </div>

    </div>
</div>

<button class="btn-virar" onclick="virarCarteirinha()">🔄 Virar carteirinha</button>

<div class="acoes">
    <button class="btn-acao btn-salvar" onclick="salvarImagem()">💾 Salvar</button>
    <button class="btn-acao btn-compartilhar" onclick="compartilhar()">📲 Compartilhar</button>
</div>

<script>
    const ritmista = JSON.parse(localStorage.getItem('ritmista'));

    if (!ritmista) {
        window.location.href = 'login.html';
    } else {
        document.getElementById('nomeRitmista').textContent = ritmista.nome;
        document.getElementById('apelidoRitmista').textContent = ritmista.apelido ? `"${ritmista.apelido}"` : '';
        document.getElementById('cpfRitmista').textContent = ritmista.cpf;
        document.getElementById('instrumentoRitmista').textContent = ritmista.instrumento || '—';

        if (ritmista.foto_url) {
            const img = document.createElement('img');
            img.src = ritmista.foto_url;
            const box = document.getElementById('fotoRitmista');
            box.innerHTML = '';
            box.appendChild(img);
        }
    }

    function virarCarteirinha() {
        document.getElementById('carteirinhaWrapper').classList.toggle('virada');
    }

    function sair() {
        localStorage.removeItem('ritmista');
        window.location.href = 'login.html';
    }

    function salvarImagem() {
        alert('Função de salvar imagem será ativada em breve!');
    }

    function compartilhar() {
        if (navigator.share && ritmista) {
            navigator.share({
                title: 'Minha Carteirinha — Swing da Leopoldina',
                text: `${ritmista.nome} — Ritmista da Imperatriz Leopoldinense. Válida até 31/07/2027!`,
            });
        } else {
            alert('Compartilhamento não disponível neste dispositivo.');
        }
    }
</script>
</body>
</html>
