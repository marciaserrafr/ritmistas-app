<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteirinha - Swing da Leopoldina</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', serif;
            background: radial-gradient(ellipse at center, #0d2b0d 0%, #050f05 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            flex-direction: column;
        }

        .topo {
            width: 100%;
            max-width: 320px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .topo span { color: #d4a017; font-size: 13px; font-weight: bold; letter-spacing: 1px; }
        .btn-sair {
            background: transparent;
            border: 1px solid #d4a017;
            color: #d4a017;
            padding: 5px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        /* CARD WRAPPER */
        .carteirinha-wrapper {
            width: 300px;
            height: 510px;
            perspective: 1200px;
        }
        .carteirinha-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.9s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }
        .carteirinha-wrapper.virada .carteirinha-inner {
            transform: rotateY(180deg);
        }

        .frente, .verso {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 22px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(212,160,23,0.15);
        }
        .verso { transform: rotateY(180deg); }

        /* ═══ FRENTE ═══ */
        .frente {
            background: #0d3b1a;
            border: 1.5px solid #c8960c;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Fundo artístico — SVG de fundo completo */
        .fundo-arte {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        /* Faixa dourada no topo */
        .faixa-topo {
            position: relative;
            z-index: 2;
            width: 100%;
            background: linear-gradient(135deg, #8B6914 0%, #d4a017 30%, #f0c842 50%, #d4a017 70%, #8B6914 100%);
            padding: 12px 16px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .escola-label {
            font-size: 8px;
            color: rgba(0,0,0,0.7);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .bateria-titulo {
            font-size: 16px;
            font-weight: bold;
            color: #0a2510;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: 'Georgia', serif;
        }

        /* Foto */
        .foto-area {
            position: relative;
            z-index: 2;
            margin-top: 18px;
        }
        .foto-anel {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4a017, #f0c842, #8B6914, #d4a017);
            padding: 3px;
            box-shadow: 0 0 25px rgba(212,160,23,0.5);
        }
        .foto-anel-interno {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #0d3b1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 32px;
        }
        .foto-anel-interno img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
        }

        /* Conteúdo do card */
        .card-body {
            position: relative;
            z-index: 2;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 20px 16px;
        }

        .funcao-tag {
            background: linear-gradient(90deg, #8B6914, #d4a017, #8B6914);
            color: #fff8e7;
            font-size: 8px;
            font-weight: bold;
            padding: 3px 18px;
            border-radius: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .nome-principal {
            font-size: 19px;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .apelido {
            font-size: 13px;
            color: #d4a017;
            font-style: italic;
            margin-top: 2px;
            margin-bottom: 14px;
        }

        .linha-dourada {
            width: 75%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d4a017, transparent);
            margin-bottom: 14px;
        }

        .info-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }
        .info-bloco {
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(212,160,23,0.2);
            border-radius: 8px;
            padding: 7px 10px;
            text-align: center;
        }
        .info-label {
            font-size: 7px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 3px;
        }
        .info-valor {
            font-size: 11px;
            color: #fff;
            font-weight: bold;
        }

        .validade-bloco {
            width: 100%;
            background: rgba(212,160,23,0.08);
            border: 1px solid rgba(212,160,23,0.4);
            border-radius: 10px;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .validade-label {
            font-size: 8px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .validade-data {
            font-size: 15px;
            color: #d4a017;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* ═══ VERSO ═══ */
        .verso {
            background: #06150a;
            border: 1.5px solid #c8960c;
            position: relative;
        }
        .verso-fundo {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        .verso-conteudo {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px 24px;
        }
        .verso-logo-area {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212,160,23,0.1) 0%, transparent 70%);
            border: 1.5px solid rgba(212,160,23,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .verso-escola-nome {
            font-size: 13px;
            font-weight: bold;
            color: #d4a017;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 4px;
        }
        .verso-fundacao {
            font-size: 9px;
            color: rgba(255,255,255,0.35);
            letter-spacing: 2px;
            margin-bottom: 24px;
        }
        .verso-divisor {
            width: 55%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d4a017, transparent);
            margin-bottom: 20px;
        }
        .verso-cargo-label {
            font-size: 8px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        .verso-cargo-nome {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 18px;
        }
        .assinatura-linha {
            width: 120px;
            height: 1px;
            background: rgba(255,255,255,0.2);
            margin-bottom: 6px;
        }
        .verso-mestre-label {
            font-size: 8px;
            color: rgba(255,255,255,0.25);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        /* BOTÕES */
        .btn-virar {
            margin-top: 18px;
            background: linear-gradient(135deg, #8B6914, #d4a017);
            border: none;
            color: #fff;
            padding: 10px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(212,160,23,0.3);
        }

        .acoes {
            width: 300px;
            margin-top: 12px;
            display: flex;
            gap: 12px;
        }
        .btn-acao {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-salvar { background: rgba(212,160,23,0.15); color: #d4a017; border: 1px solid #d4a017; }
        .btn-compartilhar { background: #25D366; color: white; }
    </style>
</head>
<body>

<div class="topo">
    <span>♛ Imperatriz Leopoldinense</span>
    <button class="btn-sair" onclick="sair()">Sair</button>
</div>

<div class="carteirinha-wrapper" id="carteirinhaWrapper">
    <div class="carteirinha-inner">

        <!-- ══════ FRENTE ══════ -->
        <div class="frente">

            <!-- FUNDO ARTÍSTICO COMPLETO -->
            <svg class="fundo-arte" viewBox="0 0 300 510" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
                <defs>
                    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%">
                        <stop offset="0%" style="stop-color:#1a6b30;stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:#0a2510;stop-opacity:1"/>
                    </radialGradient>
                    <radialGradient id="coroa-glow" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:#d4a017;stop-opacity:0.18"/>
                        <stop offset="100%" style="stop-color:#d4a017;stop-opacity:0"/>
                    </radialGradient>
                    <linearGradient id="coroa-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#f0c842;stop-opacity:0.25"/>
                        <stop offset="100%" style="stop-color:#8B6914;stop-opacity:0.08"/>
                    </linearGradient>
                    <filter id="brilho">
                        <feGaussianBlur stdDeviation="2" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>

                <!-- Fundo base -->
                <rect width="300" height="510" fill="url(#bgGlow)"/>

                <!-- Brilho central -->
                <ellipse cx="150" cy="280" rx="160" ry="200" fill="url(#coroa-glow)"/>

                <!-- ★ COROA GRANDE DE FUNDO — centro do card ★ -->
                <g transform="translate(150, 295) scale(1.6)" opacity="0.22" fill="url(#coroa-grad)" stroke="#d4a017" stroke-width="0.8">
                    <!-- Base retangular com entalhes -->
                    <rect x="-65" y="52" width="130" height="22" rx="4"/>
                    <!-- Pérolas da base -->
                    <circle cx="-42" cy="63" r="5"/>
                    <circle cx="-14" cy="63" r="5"/>
                    <circle cx="14" cy="63" r="5"/>
                    <circle cx="42" cy="63" r="5"/>
                    <!-- Corpo da coroa -->
                    <path d="M-65,52 L-65,15 L-38,36 L-18,8 L0,-18 L18,8 L38,36 L65,15 L65,52 Z" stroke-linejoin="round"/>
                    <!-- Ornamentos nos pontos da coroa -->
                    <!-- Topo central (pico mais alto) -->
                    <circle cx="0" cy="-22" r="7" fill="#d4a017" opacity="0.5"/>
                    <circle cx="0" cy="-22" r="4" fill="#fff" opacity="0.3"/>
                    <!-- Picos laterais altos -->
                    <circle cx="-19" cy="5" r="5" fill="#d4a017" opacity="0.4"/>
                    <circle cx="19" cy="5" r="5" fill="#d4a017" opacity="0.4"/>
                    <!-- Picos externos (virados para baixo) -->
                    <circle cx="-38" cy="33" r="4" fill="#d4a017" opacity="0.35"/>
                    <circle cx="38" cy="33" r="4" fill="#d4a017" opacity="0.35"/>
                    <!-- Detalhe: pequenas cruzes nos picos -->
                    <line x1="0" y1="-32" x2="0" y2="-14" stroke="#d4a017" stroke-width="1.2" opacity="0.5"/>
                    <line x1="-8" y1="-23" x2="8" y2="-23" stroke="#d4a017" stroke-width="1.2" opacity="0.5"/>
                </g>

                <!-- Ornamentos de canto — losangos e pontos decorativos -->
                <g opacity="0.15" stroke="#d4a017" stroke-width="0.8" fill="none">
                    <!-- Canto inferior esquerdo -->
                    <polygon points="20,460 35,445 50,460 35,475" />
                    <circle cx="35" cy="460" r="3" fill="#d4a017"/>
                    <!-- Canto inferior direito -->
                    <polygon points="250,460 265,445 280,460 265,475" />
                    <circle cx="265" cy="460" r="3" fill="#d4a017"/>
                </g>

                <!-- Linhas diagonais sutis de fundo -->
                <g opacity="0.05" stroke="#d4a017" stroke-width="0.5">
                    <line x1="0" y1="80" x2="300" y2="380"/>
                    <line x1="0" y1="130" x2="300" y2="430"/>
                    <line x1="300" y1="80" x2="0" y2="380"/>
                    <line x1="300" y1="130" x2="0" y2="430"/>
                </g>

                <!-- Borda interna decorativa -->
                <rect x="8" y="8" width="284" height="494" rx="16" fill="none" stroke="#d4a017" stroke-width="0.6" opacity="0.25"/>

                <!-- Pontos decorativos no meio -->
                <g fill="#d4a017" opacity="0.2">
                    <circle cx="30" cy="300" r="1.5"/>
                    <circle cx="270" cy="300" r="1.5"/>
                    <circle cx="30" cy="320" r="1"/>
                    <circle cx="270" cy="320" r="1"/>
                </g>
            </svg>

            <!-- Faixa dourada -->
            <div class="faixa-topo">
                <div class="escola-label">G.R.E.S. Imperatriz Leopoldinense</div>
                <div class="bateria-titulo">Swing da Leopoldina</div>
            </div>

            <!-- Foto -->
            <div class="foto-area">
                <div class="foto-anel">
                    <div class="foto-anel-interno" id="fotoRitmista">👤</div>
                </div>
            </div>

            <!-- Dados -->
            <div class="card-body">
                <div class="funcao-tag" id="funcaoRitmista">✦ Ritmista ✦</div>
                <div class="nome-principal" id="nomeRitmista">—</div>
                <div class="apelido" id="apelidoRitmista"></div>
                <div class="linha-dourada"></div>
                <div class="info-grid">
                    <div class="info-bloco">
                        <div class="info-label">CPF</div>
                        <div class="info-valor" id="cpfRitmista">—</div>
                    </div>
                    <div class="info-bloco">
                        <div class="info-label">Instrumento</div>
                        <div class="info-valor" id="instrumentoRitmista">—</div>
                    </div>
                </div>
                <div class="validade-bloco">
                    <span class="validade-label">Válida até</span>
                    <span class="validade-data" id="validadeCarteirinha">31/07/2027</span>
                </div>
            </div>
        </div>

        <!-- ══════ VERSO ══════ -->
        <div class="verso">
            <!-- Fundo artístico verso -->
            <svg class="verso-fundo" viewBox="0 0 300 510" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
                <defs>
                    <radialGradient id="verso-bg" cx="50%" cy="50%" r="60%">
                        <stop offset="0%" style="stop-color:#0f2d15;stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:#040c06;stop-opacity:1"/>
                    </radialGradient>
                </defs>
                <rect width="300" height="510" fill="url(#verso-bg)"/>
                <!-- Círculos concêntricos ornamentais -->
                <circle cx="150" cy="200" r="180" fill="none" stroke="#d4a017" stroke-width="0.5" opacity="0.12"/>
                <circle cx="150" cy="200" r="140" fill="none" stroke="#d4a017" stroke-width="0.5" opacity="0.10"/>
                <circle cx="150" cy="200" r="100" fill="none" stroke="#d4a017" stroke-width="0.5" opacity="0.08"/>
                <!-- Coroa menor de fundo (verso) -->
                <g transform="translate(150, 200) scale(1)" opacity="0.1" fill="none" stroke="#d4a017" stroke-width="1.2">
                    <rect x="-55" y="44" width="110" height="18" rx="3"/>
                    <path d="M-55,44 L-55,12 L-32,30 L-15,5 L0,-12 L15,5 L32,30 L55,12 L55,44 Z" stroke-linejoin="round"/>
                    <circle cx="0" cy="-16" r="5"/>
                    <circle cx="-16" cy="3" r="3.5"/>
                    <circle cx="16" cy="3" r="3.5"/>
                </g>
                <!-- Bordas decorativas -->
                <rect x="8" y="8" width="284" height="494" rx="16" fill="none" stroke="#d4a017" stroke-width="0.6" opacity="0.2"/>
                <!-- Ornamentos de canto -->
                <g opacity="0.15" stroke="#d4a017" stroke-width="0.7" fill="none">
                    <polygon points="20,20 34,34 20,48" fill="rgba(212,160,23,0.1)"/>
                    <polygon points="280,20 266,34 280,48" fill="rgba(212,160,23,0.1)"/>
                    <polygon points="20,490 34,476 20,462" fill="rgba(212,160,23,0.1)"/>
                    <polygon points="280,490 266,476 280,462" fill="rgba(212,160,23,0.1)"/>
                </g>
            </svg>

            <div class="verso-conteudo">
                <!-- Logo Imperatriz (SVG artístico) -->
                <div class="verso-logo-area">
                    <svg viewBox="0 0 100 100" width="80" height="80">
                        <g transform="translate(50, 55)" fill="none" stroke="#d4a017" stroke-width="1.5">
                            <rect x="-36" y="28" width="72" height="14" rx="3" fill="rgba(212,160,23,0.15)"/>
                            <path d="M-36,28 L-36,5 L-20,18 L-10,2 L0,-14 L10,2 L20,18 L36,5 L36,28 Z" fill="rgba(212,160,23,0.1)" stroke-linejoin="round"/>
                            <circle cx="0" cy="-18" r="5" fill="#d4a017" opacity="0.6"/>
                            <circle cx="-11" cy="0" r="3.5" fill="#d4a017" opacity="0.5"/>
                            <circle cx="11" cy="0" r="3.5" fill="#d4a017" opacity="0.5"/>
                            <circle cx="-20" cy="17" r="3" fill="#d4a017" opacity="0.4"/>
                            <circle cx="0" cy="17" r="3" fill="#d4a017" opacity="0.4"/>
                            <circle cx="20" cy="17" r="3" fill="#d4a017" opacity="0.4"/>
                            <!-- Cruz no pico -->
                            <line x1="0" y1="-26" x2="0" y2="-10" stroke="#d4a017" stroke-width="1"/>
                            <line x1="-6" y1="-18" x2="6" y2="-18" stroke="#d4a017" stroke-width="1"/>
                        </g>
                    </svg>
                </div>

                <div class="verso-escola-nome">Imperatriz Leopoldinense</div>
                <div class="verso-fundacao">✦ Fundada em 1959 ✦</div>
                <div class="verso-divisor"></div>
                <div class="verso-cargo-label">Presidente</div>
                <div class="verso-cargo-nome">A definir com a diretoria</div>
                <div class="assinatura-linha"></div>
                <div class="verso-mestre-label">Mestre de Bateria<br>Swing da Leopoldina</div>
            </div>
        </div>

    </div>
</div>

<button class="btn-virar" onclick="virarCarteirinha()">🔄 Virar carteirinha</button>

<div class="acoes">
    <button class="btn-acao btn-salvar" onclick="salvarImagem()">💾 Salvar</button>
    <button class="btn-acao btn-compartilhar" onclick="compartilhar()">📲 Compartilhar</button>
</div>

<script>
    const ritmista = JSON.parse(localStorage.getItem('ritmista'));

    if (!ritmista) {
        window.location.href = 'login.html';
    } else {
        document.getElementById('nomeRitmista').textContent = ritmista.nome;
        document.getElementById('apelidoRitmista').textContent = ritmista.apelido ? `"${ritmista.apelido}"` : '';
        document.getElementById('cpfRitmista').textContent = ritmista.cpf;
        document.getElementById('instrumentoRitmista').textContent = ritmista.instrumento || '—';

        if (ritmista.foto_url) {
            const img = document.createElement('img');
            img.src = ritmista.foto_url;
            const el = document.getElementById('fotoRitmista');
            el.innerHTML = '';
            el.appendChild(img);
        }
    }

    function virarCarteirinha() {
        document.getElementById('carteirinhaWrapper').classList.toggle('virada');
    }

    function sair() {
        localStorage.removeItem('ritmista');
        window.location.href = 'login.html';
    }

    function salvarImagem() {
        alert('Função de salvar imagem será ativada em breve!');
    }

    function compartilhar() {
        if (navigator.share && ritmista) {
            navigator.share({
                title: 'Minha Carteirinha — Swing da Leopoldina',
                text: `${ritmista.nome} — Ritmista da Imperatriz Leopoldinense. Válida até 31/07/2027!`,
            });
        } else {
            alert('Compartilhamento não disponível neste dispositivo.');
        }
    }
</script>
</body>
</html>
