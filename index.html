<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritmistas - Cadastro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo h1 {
            color: #1a1a2e;
            font-size: 28px;
            font-weight: bold;
        }
        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 4px;
        }
        .foto-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
        }
        .foto-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #f0f0f0;
            border: 3px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .foto-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .foto-preview span {
            color: #999;
            font-size: 13px;
            text-align: center;
            padding: 8px;
        }
        .btn-foto {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #555;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #1a1a2e;
        }
        .btn-cadastrar {
            width: 100%;
            padding: 14px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn-cadastrar:hover { background: #2d2d5e; }
        .link-login {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #666;
        }
        .link-login a {
            color: #1a1a2e;
            font-weight: bold;
            text-decoration: none;
        }
        .mensagem {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }
        .mensagem.sucesso { background: #d4edda; color: #155724; }
        .mensagem.erro { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🥁 Ritmistas</h1>
            <p>Sistema de Gestão da Bateria</p>
        </div>

        <div class="foto-area">
            <div class="foto-preview" onclick="document.getElementById('inputFoto').click()">
                <span>Clique para adicionar foto</span>
            </div>
            <input type="file" id="inputFoto" accept="image/*" capture="user" style="display:none" onchange="previewFoto(this)">
            <button class="btn-foto" onclick="document.getElementById('inputFoto').click()">📷 Escolher foto</button>
        </div>

        <div id="mensagem" class="mensagem"></div>

        <form id="formCadastro">
            <div class="form-group">
                <label>Nome completo</label>
                <input type="text" id="nome" placeholder="Seu nome completo" required>
            </div>
            <div class="form-group">
                <label>CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" oninput="mascaraCPF(this)">
            </div>
            <div class="form-group">
                <label>Data de nascimento</label>
                <input type="date" id="nascimento">
            </div>
            <div class="form-group">
                <label>Endereço</label>
                <input type="text" id="endereco" placeholder="Rua, número, bairro">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Crie uma senha" required>
            </div>
            <button type="submit" class="btn-cadastrar">Cadastrar</button>
        </form>

        <div class="link-login">
            Já tem cadastro? <a href="login.html">Entrar</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://pkvzsgrkylrkyzligeim.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrdnpzZ3JreWxya3l6bGlnZWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mjg0NjAsImV4cCI6MjA5ODIwNDQ2MH0.jASGzRUdZWzUwOHDww3XSDPtzw8_JU_OfTCoCpJEWBM';

        function previewFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const preview = document.querySelector('.foto-preview');
                    preview.innerHTML = `<img src="${e.target.result}">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function mascaraCPF(input) {
            let v = input.value.replace(/\D/g, '');
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            input.value = v;
        }

        function mostrarMensagem(texto, tipo) {
            const el = document.getElementById('mensagem');
            el.textContent = texto;
            el.className = `mensagem ${tipo}`;
            el.style.display = 'block';
        }

        document.getElementById('formCadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nome').value;
            const cpf = document.getElementById('cpf').value;
            const nascimento = document.getElementById('nascimento').value;
            const endereco = document.getElementById('endereco').value;
            const senha = document.getElementById('senha').value;

            const res = await fetch(`${SUPABASE_URL}/rest/v1/ritmistas`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                },
                body: JSON.stringify({ nome, cpf, nascimento, endereco, senha })
            });

            if (res.ok) {
                mostrarMensagem('Cadastro realizado com sucesso!', 'sucesso');
                document.getElementById('formCadastro').reset();
            } else {
                mostrarMensagem('Erro ao cadastrar. Tente novamente.', 'erro');
            }
        });
    </script>
</body>
</html>
